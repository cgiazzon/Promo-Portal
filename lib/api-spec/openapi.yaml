openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: PEGAPROMO API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User management
  - name: marketplaces
    description: Marketplace management
  - name: offers
    description: Offer catalog
  - name: groups
    description: WhatsApp group management
  - name: schedules
    description: Scheduling
  - name: sendHistory
    description: Send history
  - name: wallet
    description: Digital wallet
  - name: commissions
    description: Commissions
  - name: withdrawals
    description: Withdrawals
  - name: collaborators
    description: Collaborator management
  - name: plans
    description: Plans and subscriptions
  - name: admin
    description: Admin operations
  - name: featuredOffer
    description: Featured offer of the week

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register entrepreneur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /marketplaces:
    get:
      operationId: listMarketplaces
      tags: [marketplaces]
      summary: List marketplaces
      responses:
        "200":
          description: Marketplace list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Marketplace"
    post:
      operationId: createMarketplace
      tags: [marketplaces]
      summary: Create marketplace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarketplaceInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Marketplace"

  /marketplaces/{id}:
    put:
      operationId: updateMarketplace
      tags: [marketplaces]
      summary: Update marketplace
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarketplaceInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Marketplace"

  /offers:
    get:
      operationId: listOffers
      tags: [offers]
      summary: List offers
      parameters:
        - name: marketplace
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Offer list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Offer"
    post:
      operationId: createOffer
      tags: [offers]
      summary: Create offer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OfferInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Offer"

  /offers/{id}:
    get:
      operationId: getOffer
      tags: [offers]
      summary: Get offer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Offer detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Offer"
    put:
      operationId: updateOffer
      tags: [offers]
      summary: Update offer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OfferInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Offer"
    delete:
      operationId: deleteOffer
      tags: [offers]
      summary: Delete offer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /offers/extract:
    post:
      operationId: extractProductData
      tags: [offers]
      summary: Extract product data from URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExtractRequest"
      responses:
        "200":
          description: Extracted data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractedProduct"

  /groups:
    get:
      operationId: listGroups
      tags: [groups]
      summary: List groups
      responses:
        "200":
          description: Group list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Group"
    post:
      operationId: createGroup
      tags: [groups]
      summary: Create group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"

  /groups/{id}:
    get:
      operationId: getGroup
      tags: [groups]
      summary: Get group detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Group detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"
    put:
      operationId: updateGroup
      tags: [groups]
      summary: Update group
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"
    delete:
      operationId: deleteGroup
      tags: [groups]
      summary: Delete group
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /groups/{id}/test-connection:
    post:
      operationId: testGroupConnection
      tags: [groups]
      summary: Test WhatsApp connection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Connection status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionStatus"

  /schedules:
    get:
      operationId: listSchedules
      tags: [schedules]
      summary: List schedules
      responses:
        "200":
          description: Schedule list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Schedule"
    post:
      operationId: createSchedule
      tags: [schedules]
      summary: Create schedule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScheduleInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Schedule"

  /schedules/{id}:
    put:
      operationId: updateSchedule
      tags: [schedules]
      summary: Update schedule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScheduleInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Schedule"
    delete:
      operationId: cancelSchedule
      tags: [schedules]
      summary: Cancel schedule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Cancelled

  /send-history:
    get:
      operationId: listSendHistory
      tags: [sendHistory]
      summary: List send history
      responses:
        "200":
          description: Send history list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SendHistoryItem"

  /wallet:
    get:
      operationId: getWallet
      tags: [wallet]
      summary: Get wallet
      responses:
        "200":
          description: Wallet details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"

  /wallet/pix-key:
    put:
      operationId: updatePixKey
      tags: [wallet]
      summary: Update Pix key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PixKeyInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"

  /wallet/withdraw:
    post:
      operationId: requestWithdrawal
      tags: [wallet]
      summary: Request withdrawal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WithdrawalRequest"
      responses:
        "201":
          description: Withdrawal requested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Withdrawal"

  /commissions:
    get:
      operationId: listCommissions
      tags: [commissions]
      summary: List commissions
      parameters:
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Commission list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Commission"

  /withdrawals:
    get:
      operationId: listWithdrawals
      tags: [withdrawals]
      summary: List withdrawals
      responses:
        "200":
          description: Withdrawal list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Withdrawal"

  /collaborators:
    get:
      operationId: listCollaborators
      tags: [collaborators]
      summary: List collaborators
      responses:
        "200":
          description: Collaborator list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Collaborator"
    post:
      operationId: inviteCollaborator
      tags: [collaborators]
      summary: Invite collaborator
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CollaboratorInvite"
      responses:
        "201":
          description: Invited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Collaborator"

  /collaborators/{id}:
    put:
      operationId: updateCollaborator
      tags: [collaborators]
      summary: Update collaborator permissions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CollaboratorUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Collaborator"
    delete:
      operationId: removeCollaborator
      tags: [collaborators]
      summary: Remove collaborator
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed

  /plans:
    get:
      operationId: listPlans
      tags: [plans]
      summary: List available plans
      responses:
        "200":
          description: Plan list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Plan"

  /subscription:
    get:
      operationId: getSubscription
      tags: [plans]
      summary: Get current subscription
      responses:
        "200":
          description: Subscription info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"
    put:
      operationId: updateSubscription
      tags: [plans]
      summary: Update subscription plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscriptionUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"

  /featured-offer:
    get:
      operationId: getFeaturedOffer
      tags: [featuredOffer]
      summary: Get featured offer of the week
      responses:
        "200":
          description: Featured offer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeaturedOffer"
    put:
      operationId: setFeaturedOffer
      tags: [featuredOffer]
      summary: Set featured offer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeaturedOfferInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeaturedOffer"

  /admin/dashboard:
    get:
      operationId: getAdminDashboard
      tags: [admin]
      summary: Admin dashboard metrics
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDashboard"

  /admin/entrepreneurs:
    get:
      operationId: listEntrepreneurs
      tags: [admin]
      summary: List entrepreneurs
      responses:
        "200":
          description: Entrepreneur list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Entrepreneur"

  /admin/commissions:
    get:
      operationId: listAllCommissions
      tags: [admin]
      summary: List all commissions (admin)
      responses:
        "200":
          description: Commission list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminCommission"

  /admin/withdrawals:
    get:
      operationId: listAllWithdrawals
      tags: [admin]
      summary: List all withdrawals (admin)
      responses:
        "200":
          description: Withdrawal list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminWithdrawal"

  /admin/withdrawals/{id}/process:
    post:
      operationId: processWithdrawal
      tags: [admin]
      summary: Mark withdrawal as processed
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminWithdrawal"

  /admin/subscriptions:
    get:
      operationId: listSubscriptions
      tags: [admin]
      summary: List all subscriptions
      responses:
        "200":
          description: Subscription list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminSubscription"

  /entrepreneur/dashboard:
    get:
      operationId: getEntrepreneurDashboard
      tags: [users]
      summary: Entrepreneur dashboard data
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntrepreneurDashboard"

  /entrepreneur/metrics:
    get:
      operationId: getMetrics
      tags: [users]
      summary: Get metrics (Pro/Business)
      parameters:
        - name: period
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Metrics data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Metrics"

  /entrepreneur/financial:
    get:
      operationId: getFinancialSummary
      tags: [users]
      summary: Get financial summary
      parameters:
        - name: period
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Financial data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinancialSummary"

  /profile:
    get:
      operationId: getProfile
      tags: [users]
      summary: Get profile
      responses:
        "200":
          description: Profile data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
    put:
      operationId: updateProfile
      tags: [users]
      summary: Update profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    LoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    RegisterRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
        phone:
          type: string
        planId:
          type: integer
      required:
        - name
        - email
        - password
        - phone
        - planId

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required:
        - token
        - user

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        role:
          type: string
          enum: [admin, entrepreneur, collaborator]
        planId:
          type: integer
        trialEndsAt:
          type: string
          format: date-time
        status:
          type: string
          enum: [trial, active, overdue, cancelled]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - email
        - role
        - status

    Marketplace:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        affiliateCode:
          type: string
        commissionPercent:
          type: number
        color:
          type: string
        secondaryColor:
          type: string
        logoUrl:
          type: string
      required:
        - id
        - name
        - slug
        - commissionPercent
        - color

    MarketplaceInput:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        affiliateCode:
          type: string
        commissionPercent:
          type: number
        color:
          type: string
        secondaryColor:
          type: string
        logoUrl:
          type: string
      required:
        - name
        - slug
        - commissionPercent
        - color

    Offer:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        originalPrice:
          type: number
        finalPrice:
          type: number
        discountPercent:
          type: number
        couponCode:
          type: string
        category:
          type: string
        imageUrl:
          type: string
        productUrl:
          type: string
        marketplaceId:
          type: integer
        marketplaceName:
          type: string
        marketplaceColor:
          type: string
        status:
          type: string
          enum: [active, inactive, expired]
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        sendCount:
          type: integer
        clickCount:
          type: integer
      required:
        - id
        - title
        - originalPrice
        - finalPrice
        - discountPercent
        - marketplaceId
        - status

    OfferInput:
      type: object
      properties:
        title:
          type: string
        originalPrice:
          type: number
        finalPrice:
          type: number
        discountPercent:
          type: number
        couponCode:
          type: string
        category:
          type: string
        imageUrl:
          type: string
        productUrl:
          type: string
        marketplaceId:
          type: integer
        status:
          type: string
        expiresAt:
          type: string
          format: date-time
      required:
        - title
        - originalPrice
        - finalPrice
        - discountPercent
        - marketplaceId

    ExtractRequest:
      type: object
      properties:
        url:
          type: string
      required:
        - url

    ExtractedProduct:
      type: object
      properties:
        title:
          type: string
        price:
          type: number
        imageUrl:
          type: string
        marketplace:
          type: string
      required:
        - title
        - price
        - marketplace

    Group:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        niche:
          type: string
        connectionToken:
          type: string
        connectionStatus:
          type: string
          enum: [connected, disconnected]
        entrepreneurId:
          type: integer
        createdAt:
          type: string
          format: date-time
        sendCount:
          type: integer
        clickCount:
          type: integer
      required:
        - id
        - name
        - niche
        - connectionStatus
        - entrepreneurId

    GroupInput:
      type: object
      properties:
        name:
          type: string
        niche:
          type: string
        connectionToken:
          type: string
      required:
        - name
        - niche

    ConnectionStatus:
      type: object
      properties:
        connected:
          type: boolean
        message:
          type: string
      required:
        - connected
        - message

    Schedule:
      type: object
      properties:
        id:
          type: integer
        offerId:
          type: integer
        offerTitle:
          type: string
        groupIds:
          type: array
          items:
            type: integer
        groupNames:
          type: array
          items:
            type: string
        scheduledAt:
          type: string
          format: date-time
        status:
          type: string
          enum: [pending, sent, failed, cancelled]
        shortUrl:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - offerId
        - offerTitle
        - groupIds
        - scheduledAt
        - status

    ScheduleInput:
      type: object
      properties:
        offerId:
          type: integer
        groupIds:
          type: array
          items:
            type: integer
        scheduledAt:
          type: string
          format: date-time
      required:
        - offerId
        - groupIds
        - scheduledAt

    SendHistoryItem:
      type: object
      properties:
        id:
          type: integer
        offerId:
          type: integer
        offerTitle:
          type: string
        groupId:
          type: integer
        groupName:
          type: string
        sentAt:
          type: string
          format: date-time
        status:
          type: string
          enum: [sent, failed]
        clicks:
          type: integer
        shortUrl:
          type: string
      required:
